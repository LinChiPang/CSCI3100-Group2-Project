services:
  - type: web
    name: csci3100-marketplace
    env: ruby
    plan: free
    buildCommand: bundle install && npm ci --prefix frontend && VITE_USE_MOCKS=false npm --prefix frontend run build && bundle exec rails assets:precompile && bundle exec rails db:migrate
    startCommand: bundle exec rails server -p $PORT -e production
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
